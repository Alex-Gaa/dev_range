services:

  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: devgrade
      POSTGRES_USER: devgrade
      POSTGRES_PASSWORD: Asdf2020
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    image: alexandrgrebennikov/dev-range-backend:latest
    restart: always
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      "

  celery:
    image: alexandrgrebennikov/dev-range-backend:latest
    restart: always
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    command: celery -A config worker -l info

  nginx:
    image: nginx:latest
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles

volumes:
  postgres_data:
  static_volume: