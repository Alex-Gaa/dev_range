services:
  backend:
    image: alexandrgrebennikov/dev-range-backend:latest
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  celery:
    image: alexandrgrebennikov/dev-range-backend:latest
    command: celery -A config worker -l info
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: devgrade
      POSTGRES_USER: devgrade
      POSTGRES_PASSWORD: Asdf2020
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data: