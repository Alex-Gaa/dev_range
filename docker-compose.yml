services:

  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: devgrade
      POSTGRES_USER: devgrade
      POSTGRES_PASSWORD: Asdf2020
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # 🔥 ЖДЁМ ГОТОВНОСТИ БД
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devgrade"]
      interval: 5s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7-alpine
    restart: always


  backend:
    image: alexandrgrebennikov/dev-range-backend:latest
    restart: always

    env_file:
      - .env.production

    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    ports:
      - "8000:8000"

    volumes:
      - static_volume:/app/staticfiles

    # 🔥 СТАБИЛЬНЫЙ STARTUP
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 4
      "


  celery:
    image: alexandrgrebennikov/dev-range-backend:latest
    restart: always

    env_file:
      - .env.production

    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    command: celery -A config worker -l info


  nginx:
    image: nginx:latest
    restart: always

    depends_on:
      backend:
        condition: service_started

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles


volumes:
  postgres_data:
  static_volume: